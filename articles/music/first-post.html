<!DOCTYPE html>

    <title>請改成你的音樂文章標題</title>
    <meta name="description" content="請改成文章摘要，這段會顯示在音樂文章列表。" />
    <meta name="article:category" content="music" />
    <meta name="article:published" content="2026-05-25" />
    <meta name="article:updated" content="2026-05-25" />
</head>
<body>
    <!-- 複製這個檔案並重新命名，例如 second-post.html，列表頁就會自動多一篇 -->
    <article class="article-template">
        <header class="article-header">
            <p class="post-eyebrow">Music</p>
            <h1>請改成你的音樂文章標題</h1>
            <p class="post-summary">請在這裡填寫摘要，這段會出現在文章列表與文章頁面開頭。</p>
        </header>

        <section>
            <h2>前言</h2>
            <p>這裡可以寫這篇音樂文章想記錄的內容，例如創作背景、靈感來源、編曲方向或練習心得。</p>
        </section>

        <section>
            <h2>內容段落</h2>
            <p>你可以自由新增 <code>h2</code>、<code>h3</code>、<code>p</code>、<code>ul</code>、<code>img</code>、<code>pre</code> 等 HTML 標籤。</p>
            <ul>
                <li>可記錄創作流程</li>
                <li>可整理器材或軟體設定</li>
                <li>可放作品連結或心得</li>
            </ul>
        </section>
    </article>
