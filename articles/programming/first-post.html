        <header class="article-header">
            <p class="post-eyebrow">Programming</p>
            <h1>請改成你的程式文章標題</h1>
            <p class="post-summary">請在這裡填寫摘要，這段會出現在文章列表與文章頁面開頭。</p>
        </header>

        <section>
            <h2>前言</h2>
            <p>這裡可以寫這篇技術文章想記錄的主題，例如功能實作、除錯過程、架構筆記，或工具心得。</p>
        </section>

        <section>
            <h2>內容段落</h2>
            <p>如果要放程式碼，可以直接使用 <code>pre</code> 與 <code>code</code>。</p>
            <pre><code>// 在這裡貼上你的程式碼
function example() {
    return "Hello CodeDiary";
}</code></pre>
